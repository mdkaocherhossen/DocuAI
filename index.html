<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DocuMind AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
}

header{
text-align:center;
padding:80px 20px;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
}

header h1{
font-size:3rem;
margin-bottom:10px;
}

header p{
font-size:1.1rem;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
padding:30px 0;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#4f46e5;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:.9;
}

#result{
margin-top:20px;
white-space:pre-wrap;
line-height:1.8;
}

footer{
text-align:center;
padding:25px;
background:#111827;
margin-top:30px;
}

</style>
</head>

<body>

<header>
<h1>DocuMind AI</h1>
<p>Create Documentary Scripts With AI</p>
</header>

<div class="container">

<div class="card">

<h2>Generate Documentary</h2>

<br>

<input
id="topic"
type="text"
placeholder="Example: Toba Supervolcano">

<button onclick="generateAI()">
Generate
</button>

<div id="result"></div>

</div>

</div>

<footer>
© 2026 DocuMind AI
</footer>

<script>

async function generateAI(){

const topic =
document.getElementById("topic").value;

const result =
document.getElementById("result");

if(topic===""){
alert("Enter a topic");
return;
}

result.innerHTML="Generating...";

const API_KEY="AQ.Ab8RN6IOQpzWtcb582Umf_2_Mz468VbgaDyyKnz8JemQL61quQ";

try{

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:
`Create a professional documentary package about ${topic}.

Include:
1. Documentary Script
2. SEO Title
3. YouTube Description
4. 15 SEO Tags
5. Thumbnail Text`
}
]
}
]
})
}
);

const data=await response.json();

result.innerHTML=
data.candidates[0].content.parts[0].text;

}
catch(error){

const data = await response.json();

console.log(data);

if(data.candidates){
    result.innerHTML =
    data.candidates[0].content.parts[0].text;
}else{
    result.innerHTML =
    JSON.stringify(data,null,2);
};

}

}

</script>

</body>
</html>
