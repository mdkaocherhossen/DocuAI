<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuMind AI v2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.header{
text-align:center;
padding:50px 20px;
}

.header h1{
font-size:3rem;
background:linear-gradient(90deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
color:#94a3b8;
margin-top:10px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#334155;
color:white;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-right:10px;
}

.generate{
background:#8b5cf6;
color:white;
}

.copy{
background:#22c55e;
color:white;
}

#result{
margin-top:20px;
background:#0f172a;
padding:20px;
border-radius:12px;
white-space:pre-wrap;
min-height:150px;
}

.loader{
display:none;
margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>DocuMind AI</h1>
<p>Professional Documentary Generator</p>
</div>

<div class="card">

<input
id="topic"
placeholder="Example: Toba Supervolcano">

<button
class="generate"
onclick="generateAI()">
Generate
</button>

<button
class="copy"
onclick="copyResult()">
Copy
</button>

<div class="loader" id="loader">
⏳ Generating...
</div>

<div id="result">
Your documentary will appear here...
</div>

</div>

</div>

<script>

async function generateAI(){

const topic =
document.getElementById("topic").value;

const result =
document.getElementById("result");

const loader =
document.getElementById("loader");

if(!topic){
alert("Enter a topic");
return;
}

loader.style.display="block";
result.innerHTML="";

const API_KEY="AQ.Ab8RN6IOQpzWtcb582Umf_2_Mz468VbgaDyyKnz8JemQL61quQ";

try{

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{
text:`Create a professional documentary package about ${topic}.

Include:
1. Documentary Script
2. SEO Title
3. YouTube Description
4. Thumbnail Text
5. 15 Tags`
}]
}]
})
}
);

const data=await response.json();

loader.style.display="none";

if(data.candidates){

result.innerHTML=
data.candidates[0].content.parts[0].text;

}else{

result.innerHTML=
JSON.stringify(data,null,2);

}

}catch(error){

loader.style.display="none";

result.innerHTML=
"Error: " + error.message;

}

}

function copyResult(){

const text =
document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Copied!");

}

</script>

</body>
</html>
